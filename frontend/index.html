<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agilize Bank - Sistema Bancário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Agilize Bank</h1>
        <p class="subtitle">Processo Seletivo - Estágio em Tecnologia</p>
    </header>

    <div class="cards-container" id="contas-lista">
        <p>Carregando contas do servidor...</p>
    </div>

    <div class="operacoes">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('saque')">Saque (Obrigatório)</button>
            <button class="tab-btn" onclick="switchTab('transferencia')">Transferência (Diferencial)</button>
        </div>

        <div id="tab-saque" class="tab-content active">
            <form id="form-saque" onsubmit="executarSaque(event)">
                <div class="form-group">
                    <label for="saque-conta">Selecione a Conta</label>
                    <select id="saque-conta" required></select>
                </div>
                <div class="form-group">
                    <label for="saque-valor">Valor (R$)</label>
                    <input type="number" id="saque-valor" step="0.01" min="0.01" placeholder="0,00" required>
                </div>
                <button type="submit" class="btn-submit">Confirmar Saque</button>
            </form>
        </div>

        <div id="tab-transferencia" class="tab-content">
            <form id="form-transferencia" onsubmit="executarTransferencia(event)">
                <div class="form-group">
                    <label for="trans-origem">Conta de Origem</label>
                    <select id="trans-origem" required></select>
                </div>
                <div class="form-group">
                    <label for="trans-destino">Conta de Destino</label>
                    <select id="trans-destino" required></select>
                </div>
                <div class="form-group">
                    <label for="trans-valor">Valor (R$)</label>
                    <input type="number" id="trans-valor" step="0.01" min="0.01" placeholder="0,00" required>
                </div>
                <button type="submit" class="btn-submit">Confirmar Transferência</button>
            </form>
        </div>

        <div id="mensagem"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
